<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Grandma Dashboard</title>

  <script src="/config.js"></script>
  <script src="/shared.js"></script>
  <script src="https://call.dryangai.com/external_api.js"></script>

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      overflow: hidden;
    }

    #dashboard {
      height: 100vh;
    }

    .clock {
      font-size: 80px;
      margin-top: 60px;
    }

    .date {
      font-size: 36px;
      margin-bottom: 40px;
    }

    .message {
      font-size: 42px;
      margin-top: 40px;
    }

    .carousel {
      position: relative;
      width: 80vw;
      height: 55vh;
      margin: 20px auto 0;
      overflow: hidden;
      border-radius: 20px;
      background: #000;
    }

    .carousel-track {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .slide {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: none;
      background: #000;
    }

    .slide.active {
      display: block;
    }

    .carousel button {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.4);
      border: none;
      color: white;
      font-size: 40px;
      padding: 8px 12px;
      cursor: pointer;
      border-radius: 6px;
    }

    #prev { left: 10px; }
    #next { right: 10px; }

    .dots {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: 12px;
    }

    .dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.4);
      margin: 0 6px;
      cursor: pointer;
    }

    .dot.active {
      background: white;
    }

    #callScreen {
      display: none;
      width: 100vw;
      height: 100vh;
      background: black;
    }
  </style>
</head>

<body>
  <div id="dashboard">
    <div class="clock" id="clock"></div>
    <div class="date" id="date"></div>

    <div id="carousel" class="carousel">
      <div id="carouselTrack" class="carousel-track"></div>
      <button id="prev">‹</button>
      <button id="next">›</button>
      <div id="dots" class="dots"></div>
    </div>

    <div class="message">Waiting for family calls...</div>
  </div>

  <div id="callScreen"></div>

  <script>
    const ROOM = "GrandmaStationFamilyRoom2026";
    const JITSI_DOMAIN = "call.dryangai.com";
    let api = null;

    function updateTime() {
      const now = new Date();
      document.getElementById("clock").textContent =
        now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });

      document.getElementById("date").textContent =
        now.toLocaleDateString([], {
          weekday: "long",
          month: "long",
          day: "numeric"
        });
    }

    updateTime();
    setInterval(updateTime, 1000);

    function startCall() {
      document.getElementById("dashboard").style.display = "none";
      document.getElementById("callScreen").style.display = "block";

      if (api) return;

      api = new JitsiMeetExternalAPI(JITSI_DOMAIN, {
        roomName: ROOM,
        parentNode: document.getElementById("callScreen"),
        width: "100%",
        height: "100%",
        configOverwrite: {
          prejoinConfig: { enabled: false },
          startWithAudioMuted: false,
          startWithVideoMuted: false
        },
        userInfo: {
          displayName: "Grandma"
        }
      });
    }

    function returnDashboard() {
      if (api) {
        api.dispose();
        api = null;
      }

      document.getElementById("callScreen").innerHTML = "";
      document.getElementById("callScreen").style.display = "none";
      document.getElementById("dashboard").style.display = "block";
    }

    const ws = new WebSocket(`ws://${location.host}`);

    ws.onmessage = (event) => {
      const data = JSON.parse(event.data);

      if (data.type === "call") {
        startCall();
      }

      if (data.type === "dashboard") {
        returnDashboard();
      }
    };

    // Photo carousel
    (function() {
      const track = document.getElementById("carouselTrack");
      const dots = document.getElementById("dots");
      const prev = document.getElementById("prev");
      const next = document.getElementById("next");
      const carousel = document.getElementById("carousel");

      let slides = [];
      let current = 0;
      let timer = null;

      function showSlide(idx) {
        slides.forEach((s, i) => s.classList.toggle("active", i === idx));
        Array.from(dots.children).forEach((d, i) =>
          d.classList.toggle("active", i === idx)
        );
        current = idx;
      }

      function startAuto() {
        stopAuto();
        if (slides.length > 1) {
          timer = setInterval(() => {
            showSlide((current + 1) % slides.length);
          }, 4000);
        }
      }

      function stopAuto() {
        if (timer) clearInterval(timer);
      }

      prev.onclick = () => {
        if (!slides.length) return;
        showSlide((current - 1 + slides.length) % slides.length);
        startAuto();
      };

      next.onclick = () => {
        if (!slides.length) return;
        showSlide((current + 1) % slides.length);
        startAuto();
      };

      fetch("/api/photos")
        .then(r => r.json())
        .then(list => {
          if (!list || !list.length) {
            carousel.style.display = "none";
            return;
          }

          list.forEach((url, i) => {
            const img = document.createElement("img");
            img.src = url;
            img.className = "slide";
            track.appendChild(img);
            slides.push(img);

            const dot = document.createElement("span");
            dot.className = "dot";
            dot.onclick = () => {
              showSlide(i);
              startAuto();
            };
            dots.appendChild(dot);
          });

          showSlide(0);
          startAuto();
        });
    })();
  </script>
</body>
</html>
